name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-apk:
    name: Build Android APK
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Unify Android SDK env vars
        run: |
          # GitHub runners have ANDROID_SDK_ROOT but Gradle may also look for ANDROID_HOME
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "SDK is at: $ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/platforms/" | tail -3
          ls "$ANDROID_SDK_ROOT/build-tools/" | tail -3

      - name: Get Gradle wrapper jar
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          # Download wrapper jar from Gradle's GitHub release tag
          GRADLE_VER=8.5
          curl -sL \
            "https://github.com/gradle/gradle/raw/v${GRADLE_VER}.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          # Verify it's a real JAR (zip magic bytes)
          hexdump -C gradle/wrapper/gradle-wrapper.jar | head -2
          ls -lh gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: List built APKs
        run: find android -name "*.apk" -ls

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: event-horizon-clone-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
