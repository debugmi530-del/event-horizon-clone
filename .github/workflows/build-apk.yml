name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-apk:
    name: Build Android APK
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check Android SDK on runner
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/build-tools/ || echo "no build-tools"
          ls $ANDROID_HOME/platforms/ | head -5 || echo "no platforms"

      - name: Install missing SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Install Gradle wrapper jar
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          # Download gradle-wrapper.jar from official repo
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find APK files
        run: find android -name "*.apk" -ls

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: event-horizon-clone-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
