name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-apk:
    name: Build Android APK
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Show Android SDK info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ | tail -3
          ls $ANDROID_HOME/platforms/ | tail -5

      - name: Install Gradle wrapper jar
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.5/gradle-wrapper-8.5.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find APK
        run: find android -name "*.apk" -ls

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: event-horizon-clone-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
